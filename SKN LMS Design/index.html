<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Saeed MDCAT · LMS Design System</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #efece4; font-family: "Plus Jakarta Sans", system-ui, sans-serif; }
  #root { width: 100%; height: 100%; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="brand.jsx"></script>
  <script type="text/babel" src="auth.jsx"></script>
  <script type="text/babel" src="dashboard.jsx"></script>
  <script type="text/babel" src="courses.jsx"></script>
  <script type="text/babel" src="practice.jsx"></script>
  <script type="text/babel" src="player.jsx"></script>
  <script type="text/babel" src="engage.jsx"></script>
  <script type="text/babel" src="library.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { useTweaks, TweaksPanel, TweakRadio, TweakSection } = window;
    const W = 1440, H = 900;

    function App() {
      // Light / Dark global toggle — drives all artboard themes.
      const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
        "theme": "dark"
      }/*EDITMODE-END*/;
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const th = t.theme;

      return (
        <>
          <DesignCanvas>

            <DCSection id="brand" title="00 · Brand System" subtitle="Color tokens, type pairing, components — fully themed">
              <DCArtboard id="brand-light" label="Day mode · #f7f6fb" width={1440} height={900}>
                <ThemePanel theme="light" />
              </DCArtboard>
              <DCArtboard id="brand-dark"  label="Night mode · #0a0a0f" width={1440} height={900}>
                <ThemePanel theme="dark" />
              </DCArtboard>
            </DCSection>

            <DCSection id="auth" title="01 · Auth" subtitle="Sign-in & onboarding — the first taste of the brand">
              <DCArtboard id="login"  label="Sign in" width={W} height={H}><AuthShell theme={th} mode="login" /></DCArtboard>
              <DCArtboard id="signup" label="Create account" width={W} height={H}><AuthShell theme={th} mode="signup" /></DCArtboard>
            </DCSection>

            <DCSection id="dashboard" title="02 · Student Dashboard" subtitle="Daily home — streak hero, goal rings, today's plan">
              <DCArtboard id="dashboard" label="Dashboard · home" width={W} height={H}><DashboardPage theme={th} /></DCArtboard>
            </DCSection>

            <DCSection id="courses" title="03 · Courses" subtitle="Catalogue + chapter detail with curriculum tree">
              <DCArtboard id="courses-list" label="My Courses · catalogue" width={W} height={H}><CoursesListPage theme={th} /></DCArtboard>
              <DCArtboard id="courses-detail" label="Course detail · curriculum" width={W} height={H}><CourseDetailPage theme={th} /></DCArtboard>
            </DCSection>

            <DCSection id="practice" title="04 · Practice tests" subtitle="Build → take → review → analyze">
              <DCArtboard id="create-test" label="Create Practice Test" width={W} height={H}><CreateTestPage theme={th} /></DCArtboard>
              <DCArtboard id="history" label="Test History" width={W} height={H}><TestHistoryPage theme={th} /></DCArtboard>
              <DCArtboard id="reports" label="MCQ Reports · analytics" width={W} height={H}><ReportsPage theme={th} /></DCArtboard>
            </DCSection>

            <DCSection id="player" title="05 · Test Player · focus mode" subtitle="Distraction-free MCQ-taking + result deep-dive">
              <DCArtboard id="player" label="Test Player · in-progress" width={W} height={H}><TestPlayerPage theme={th} /></DCArtboard>
              <DCArtboard id="result" label="Test Result" width={W} height={H}><TestResultPage theme={th} /></DCArtboard>
            </DCSection>

            <DCSection id="engage" title="06 · Engagement" subtitle="Leaderboard + community — what keeps students coming back">
              <DCArtboard id="leaderboard" label="Leaderboard" width={W} height={H}><LeaderboardPage theme={th} /></DCArtboard>
              <DCArtboard id="community" label="Community" width={W} height={H}><CommunityPage theme={th} /></DCArtboard>
            </DCSection>

            <DCSection id="library" title="07 · Resources" subtitle="Notes, videos, and messages — the support stack">
              <DCArtboard id="notes" label="Notes · editor" width={W} height={H}><NotesPage theme={th} /></DCArtboard>
              <DCArtboard id="videos" label="Video lectures" width={W} height={H}><VideosPage theme={th} /></DCArtboard>
              <DCArtboard id="messages" label="Messages" width={W} height={H}><MessagesPage theme={th} /></DCArtboard>
            </DCSection>

            <DCSection id="account" title="08 · Account" subtitle="Profile, preferences, study plan">
              <DCArtboard id="settings" label="Profile & Settings" width={W} height={H}><SettingsPage theme={th} /></DCArtboard>
            </DCSection>

          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection title="Theme" subtitle="Toggle the global colour mode applied to every artboard.">
              <TweakRadio value={t.theme} onChange={v => setTweak("theme", v)}
                options={[{ value: "light", label: "Light" }, { value: "dark", label: "Dark" }]} />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
